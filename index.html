<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>COP Vertailu</title>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    #chart {
      width: 100%;
      height: 80vh;
    }
  </style>
</head>
<body>

<h1>COP Vertailu</h1>

<div id="chart"></div>

<script>

const data = [{
  x: [-25, -15, -7, 2, 7, 15, 20, 35],
  y: [2.0, 2.9, 3.4, 4.3, 5.1, 6.0, 6.8, 9.2],
  mode: 'lines+markers',
  name: 'Samsung R290'
}];

Plotly.newPlot('chart', data, {
  paper_bgcolor: '#111',
  plot_bgcolor: '#111',
  font: {
    color: 'white'
  },
  xaxis: {
    title: 'Ulkolämpötila °C'
  },
  yaxis: {
    title: 'COP'
  }
});

</script>

</body>
</html>
